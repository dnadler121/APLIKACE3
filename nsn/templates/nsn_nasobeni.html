{% extends "nsn_base_html" %}
{% block content %}
<div class="card">

<h1>Součin pro NSN</h1>

<div class="rowbox">

{% for x in final %}
<span class="factor">{{ x }}</span>
{% if not loop.last %} × {% endif %}
{% endfor %}

</div>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="post">

<input type="number" name="value">

<button type="submit">Zkontrolovat</button>

</form>

</div>
{% endblock %}
