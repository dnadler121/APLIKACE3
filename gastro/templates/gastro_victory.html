<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Únik dokončen</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <link rel="stylesheet"href="{{ url_for('gastro.static', filename='style.css') }}">
</head>
<body class="victory">
    <div class="noise"></div>
    <div class="victory-screen">
        <div class="badge">RESTAURANT RESTORED</div>
        <h1>ÚNIK DOKONČEN</h1>
        <p>Tým <strong>{{ team }}</strong> zachránil restauraci.</p>
        <p>Čas: {{ minutes }} min {{ seconds }} s</p>
        <p>Zbývající životy: {{ lives }}</p>
        <div class="teacher">Zavolejte učitele a ukažte tuto obrazovku.</div>
    </div>
    <script>
        history.pushState(null, null, location.href);
        window.onpopstate = function () { history.go(1); };
    </script>
</body>
</html>
